name: AI docs update

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "What should the AI update? e.g. 'Document the new dashboard sharing flow under docs/dashboards'"
        required: true
        type: string
      target_url:
        description: "Override staging URL (optional; defaults to STAGING_URL secret)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-docs-${{ github.actor }}
  cancel-in-progress: false

jobs:
  ai-docs-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify actor has admin permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            if (data.permission !== 'admin') {
              core.setFailed(
                `Only repo admins can run this workflow. ${context.actor} has '${data.permission}'.`
              );
            }

      - name: Clone dalgo-core (harness + skills, becomes workspace root)
        uses: actions/checkout@v4
        with:
          repository: DalgoT4D/dalgo-core
          fetch-depth: 1

      - name: Checkout dalgo_docs
        uses: actions/checkout@v4
        with:
          path: dalgo_docs

      - name: Clone webapp_v2
        uses: actions/checkout@v4
        with:
          repository: DalgoT4D/webapp_v2
          path: webapp_v2
          fetch-depth: 1

      - name: Clone DDP_backend
        uses: actions/checkout@v4
        with:
          repository: DalgoT4D/DDP_backend
          path: DDP_backend
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install docs dependencies
        working-directory: dalgo_docs
        run: npm install

      - name: Install Playwright Chromium
        run: npx -y playwright@latest install chromium --with-deps

      - name: Generate run slug
        id: slug
        run: echo "slug=$(date -u +%Y%m%d-%H%M%S)-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Run Claude docs agent
        uses: anthropics/claude-code-action@beta
        env:
          STAGING_URL: ${{ inputs.target_url != '' && inputs.target_url || secrets.STAGING_URL }}
          STAGING_USERNAME: ${{ secrets.STAGING_USERNAME }}
          STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
          RUN_SLUG: ${{ steps.slug.outputs.slug }}
        with:
          mode: agent
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "-y",
                    "@playwright/mcp@latest",
                    "--headless",
                    "--browser=chromium",
                    "--viewport-size=1440,900",
                    "--output-dir",
                    "${{ github.workspace }}/dalgo_docs/static/img"
                  ]
                }
              }
            }
          max_turns: "60"
          claude_env: |
            STAGING_URL: ${{ secrets.STAGING_URL }}
            STAGING_USERNAME: ${{ secrets.STAGING_USERNAME }}
            STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
          direct_prompt: |
            You are running inside the `dalgo-core` harness. The workspace
            layout is:

            - `./` (cwd) — dalgo-core (skills, agents, scripts)
            - `./dalgo_docs/` — the Docusaurus docs repo to edit
            - `./webapp_v2/` — frontend source (Next.js)
            - `./DDP_backend/` — backend source (Django)

            Use the `docs-generation` skill (in `.claude/skills/docs-generation/`)
            as your playbook.

            Request:
            ${{ inputs.prompt }}

            Hard requirements:
            - Read `./webapp_v2/` to understand the feature's UI structure and
              identify whether it is one page or multiple distinct menu items /
              routes. Mirror that structure in the docs.
            - All doc edits go under `./dalgo_docs/docs/`. Screenshots go under
              `./dalgo_docs/static/img/<feature>/`. Sidebar updates go in
              `./dalgo_docs/sidebars.js`.
            - Screenshots: the Playwright MCP server is configured with
              `--output-dir ${{ github.workspace }}/dalgo_docs/static/img`
              (absolute path). When you call `mcp__playwright__browser_take_screenshot`,
              ALWAYS pass `filename` in the form `<feature>/<descriptive-name>.png`
              (e.g. `kpis/list.png`, `kpis/create_form.png`). After the call
              returns successfully, the PNG IS on disk at
              `dalgo_docs/static/img/<feature>/<descriptive-name>.png` — treat it
              as a real captured image and reference it in MDX as
              `/img/<feature>/<descriptive-name>.png`. Do NOT add a
              `:::info Screenshot coming soon` admonition for a screenshot you
              successfully captured.
            - Only use `:::info Screenshot coming soon` when login or navigation
              actually failed and you could not capture the screenshot at all.
              Never invent screenshot filenames you didn't capture.
            - MDX gotcha: avoid bare angle brackets (`<7 days>`, `<error>`) and
              bare curly braces (`{value}`) in prose — MDX parses them as JSX
              and the build will fail. Wrap them in backticks: `` `<7 days>` ``,
              `` `{value}` ``. Or use HTML entities `&lt;`/`&gt;`/`&#123;`.

            Stop once files in `./dalgo_docs/` are edited — the workflow
            validates with `npm run build` and opens a PR.

      - name: Show agent output (debug)
        if: always()
        run: |
          echo "--- dalgo_docs/static/img/ tree ---"
          find dalgo_docs/static/img -type f -printf '%p (%s bytes)\n' 2>/dev/null || ls -laR dalgo_docs/static/img 2>/dev/null || echo "(empty or missing)"
          echo "--- dalgo_docs/docs/ changes ---"
          cd dalgo_docs && git status --short

      - name: Validate Docusaurus build
        id: build
        working-directory: dalgo_docs
        continue-on-error: true
        run: npm run build

      - name: Create pull request
        if: always()
        uses: peter-evans/create-pull-request@v6
        with:
          draft: ${{ steps.build.outcome != 'success' }}
          path: dalgo_docs
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-docs/${{ steps.slug.outputs.slug }}
          base: main
          commit-message: "docs(ai): ${{ inputs.prompt }}"
          title: "docs(ai): ${{ inputs.prompt }}"
          add-paths: |
            docs/**
            static/img/**
            sidebars.js
          body: |
            **Triggered by:** @${{ github.actor }}
            **Prompt:** ${{ inputs.prompt }}
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Auto-generated by the AI docs workflow.

            Review checklist:
            - [ ] Screenshots match the described flow
            - [ ] MDX prose is accurate and consistent with the rest of the section
            - [ ] No edits outside `docs/` and the agreed screenshot folder
          labels: ai-docs
