name: AI docs update

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "What should the AI update? e.g. 'Document the new dashboard sharing flow under docs/dashboards'"
        required: true
        type: string
      target_url:
        description: "Override staging URL (optional; defaults to STAGING_URL secret)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-docs-${{ github.actor }}
  cancel-in-progress: false

jobs:
  ai-docs-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify actor has admin permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            if (data.permission !== 'admin') {
              core.setFailed(
                `Only repo admins can run this workflow. ${context.actor} has '${data.permission}'.`
              );
            }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx -y playwright@latest install chromium --with-deps

      - name: Generate run slug
        id: slug
        run: echo "slug=$(date -u +%Y%m%d-%H%M%S)-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Run Claude docs agent
        uses: anthropics/claude-code-action@beta
        env:
          STAGING_URL: ${{ inputs.target_url != '' && inputs.target_url || secrets.STAGING_URL }}
          STAGING_USERNAME: ${{ secrets.STAGING_USERNAME }}
          STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
          RUN_SLUG: ${{ steps.slug.outputs.slug }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mcp_config: .claude/mcp-config.json
          claude_args: "--max-turns 60"
          prompt: |
            Use the `docs-generation` skill as your playbook.

            Request:
            ${{ inputs.prompt }}

            Stop once files are edited — the workflow validates with
            `npm run build` and opens a PR.

      - name: Validate Docusaurus build
        run: npm run build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai-docs/${{ steps.slug.outputs.slug }}
          base: main
          commit-message: "docs(ai): ${{ inputs.prompt }}"
          title: "docs(ai): ${{ inputs.prompt }}"
          body: |
            **Triggered by:** @${{ github.actor }}
            **Prompt:** ${{ inputs.prompt }}
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Auto-generated by the AI docs workflow.

            Review checklist:
            - [ ] Screenshots match the described flow
            - [ ] MDX prose is accurate and consistent with the rest of the section
            - [ ] No edits outside `docs/` and the agreed screenshot folder
          labels: ai-docs
          draft: false  
